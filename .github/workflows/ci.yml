name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  frontend-tests:
    name: Frontend Unit + Smoke E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run frontend integration gate
        run: npm run ci:frontend

  rust-tests:
    name: Rust Unit Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

  a6-integration-gate:
    name: A6 Integration Gate
    runs-on: ubuntu-latest
    needs: [frontend-tests, rust-tests]
    steps:
      - name: Gate status
        run: |
          echo 'A6 gate passed - connect/login/home/detail/player/search smoke and baseline tests are green.'
