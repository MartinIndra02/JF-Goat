name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  frontend-tests:
    name: Frontend Unit + Smoke E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run frontend integration gate
        run: npm run ci:frontend

  rust-tests:
    name: Rust Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install mpv pkg-config

      - name: Create LFS config hash (Windows)
        if: matrix.os == 'windows-latest'
        id: lfs-cache-key
        run: echo "hash=${{ hashFiles('src-tauri/bin/mpv-2.dll') }}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Cache Git LFS files (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/cache@v4
        id: lfs-cache
        with:
          path: .git/lfs
          key: ${{ runner.os }}-lfs-${{ steps.lfs-cache-key.outputs.hash }}
          restore-keys: |
            ${{ runner.os }}-lfs-

      - name: Explicitly download LFS files (Windows)
        if: matrix.os == 'windows-latest'
        run: git lfs pull

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

  a6-integration-gate:
    name: A6 Integration Gate
    runs-on: ubuntu-latest
    needs: [frontend-tests, rust-tests]
    steps:
      - name: Gate status
        run: |
          echo 'A6 gate passed - connect/login/home/detail/player/search smoke and baseline tests are green.'
