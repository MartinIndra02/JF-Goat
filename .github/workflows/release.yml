name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-release:
    name: Build Signed Release Artifacts (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    env:
      WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install mpv pkg-config dylibbundler

      - name: Create LFS config hash (Windows)
        if: matrix.os == 'windows-latest'
        id: lfs-cache-key
        run: echo "hash=${{ hashFiles('src-tauri/bin/mpv-2.dll') }}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Cache Git LFS files (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/cache@v4
        id: lfs-cache
        with:
          path: .git/lfs
          key: ${{ runner.os }}-lfs-${{ steps.lfs-cache-key.outputs.hash }}
          restore-keys: |
            ${{ runner.os }}-lfs-

      - name: Explicitly download LFS files (Windows)
        if: matrix.os == 'windows-latest'
        run: git lfs pull

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Decode Windows certificate (Windows)
        if: matrix.os == 'windows-latest' && env.WINDOWS_CERTIFICATE_BASE64 != ''
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "jfgoat-signing-cert.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String("${{ env.WINDOWS_CERTIFICATE_BASE64 }}"))
          "WINDOWS_CERTIFICATE_PATH=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Tauri release
        run: npm run release:tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          LIBRARY_PATH: /opt/homebrew/lib:/usr/local/lib

      - name: Generate updater latest.json
        run: node src-tauri/scripts/generate-updater-json.js

      - name: Upload release artifacts (workflow)
        uses: actions/upload-artifact@v4
        with:
          name: jfgoat-release-bundle-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/**/*

      - name: Upload updater JSON artifact (workflow)
        uses: actions/upload-artifact@v4
        with:
          name: updater-json-${{ matrix.os }}
          path: src-tauri/target/release/bundle/updater-*.json

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app.tar.gz
            src-tauri/target/release/bundle/**/*.zip
            src-tauri/target/release/bundle/**/*.sig
          generate_release_notes: true

  publish-updater:
    name: Merge and Publish Updater JSON
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all updater JSON artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: updater-json-*
          path: updater-jsons
          merge-multiple: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Merge updater JSON files
        run: |
          node -e '
            const fs = require("fs");
            const path = require("path");
            
            const dir = "updater-jsons";
            if (!fs.existsSync(dir)) {
              console.error("Directory not found: " + dir);
              process.exit(1);
            }
            
            const files = fs.readdirSync(dir).filter(f => f.startsWith("updater-") && f.endsWith(".json"));
            if (files.length === 0) {
              console.error("No updater JSON files found in " + dir);
              process.exit(1);
            }
            
            let merged = null;
            for (const file of files) {
              const content = JSON.parse(fs.readFileSync(path.join(dir, file), "utf-8"));
              console.log("Reading " + file + " for version " + content.version);
              
              if (!merged) {
                merged = {
                  version: content.version,
                  notes: content.notes,
                  pub_date: content.pub_date,
                  platforms: {}
                };
              }
              
              Object.assign(merged.platforms, content.platforms);
            }
            
            fs.writeFileSync("latest.json", JSON.stringify(merged, null, 2), "utf-8");
            console.log("Successfully merged into latest.json:", JSON.stringify(merged, null, 2));
          '

      - name: Publish merged latest.json to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
