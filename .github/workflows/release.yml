name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-release:
    name: Build Signed Release Artifacts
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}

    steps:
      - uses: actions/checkout@v4

      - name: Create LFS config hash
        id: lfs-cache-key
        run: echo "hash=${{ hashFiles('src-tauri/bin/mpv-2.dll') }}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Cache Git LFS files
        uses: actions/cache@v4
        id: lfs-cache
        with:
          path: .git/lfs
          key: ${{ runner.os }}-lfs-${{ steps.lfs-cache-key.outputs.hash }}
          restore-keys: |
            ${{ runner.os }}-lfs-

      - name: Explicitly download LFS files
        run: git lfs pull

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Decode Windows certificate
        if: ${{ env.WINDOWS_CERTIFICATE_BASE64 != '' }}
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "jfgoat-signing-cert.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String("${{ env.WINDOWS_CERTIFICATE_BASE64 }}"))
          "WINDOWS_CERTIFICATE_PATH=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Tauri release
        run: npm run release:tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

      - name: Generate updater latest.json
        run: node src-tauri/scripts/generate-updater-json.js

      - name: Upload release artifacts (workflow)
        uses: actions/upload-artifact@v4
        with:
          name: jfgoat-release-bundle
          path: |
            src-tauri/target/release/bundle/**/*

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.zip
            src-tauri/target/release/bundle/**/*.sig
            src-tauri/target/release/bundle/**/latest*.json
          generate_release_notes: true
